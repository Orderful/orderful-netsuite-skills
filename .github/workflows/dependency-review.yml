# Dependency Review
#
# Scans PRs for new dependencies with known vulnerabilities or disallowed licenses (§3.2).
# Free for public repositories.

name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block PRs that introduce dependencies with these licenses (§3.2)
          deny-licenses: GPL-2.0-only, GPL-3.0-only, AGPL-3.0-only, SSPL-1.0, BUSL-1.1
          # Fail on vulnerabilities rated high or critical
          fail-on-severity: high
          comment-summary-in-pr: always
