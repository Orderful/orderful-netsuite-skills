# DCO (Developer Certificate of Origin) Check
#
# Verifies all commits in a PR have a valid Signed-off-by trailer.
# Required by §3.3 — contributors certify their right to submit via `git commit -s`.

name: DCO

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  dco:
    name: DCO Sign-off Check
    runs-on: ubuntu-latest
    steps:
      # The probot/dco action is the standard DCO enforcement bot.
      # It checks every commit in the PR for a valid Signed-off-by line.
      - name: DCO Check
        uses: probot/dco@113757536857a840e6b607a35547d7c696dfd1dd # v1.0.0
